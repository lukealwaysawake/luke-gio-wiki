<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>지오 ♥ 동현 · 관계위키</title>
    <meta
      name="description"
      content="지오와 동현이 같이 보낸 날들과 통화로 쌓인 마음을 모아둔 관계위키 — 들어가기"
    />
    <meta name="theme-color" content="#ffd7e6" />
    <meta property="og:title" content="지오 ♥ 동현 · 관계위키" />
    <meta
      property="og:description"
      content="구리, 오니바 고백, 수족관, 제로컴플렉스, 북촌, 한옥호텔, 그리고 통화로 쌓인 마음의 기록."
    />
    <link rel="stylesheet" href="./landing.css" />
    <script>
      // Keep the canonical domain.
      if (location.hostname === "luke-gio-wiki.vercel.app") {
        location.replace(`https://luke-jio-wiki.vercel.app/${location.search}${location.hash}`);
      }
      // Match whatever theme the visitor last chose in the wiki.
      try {
        var saved =
          localStorage.getItem("luke-jio-wiki-theme") ||
          localStorage.getItem("luke-gio-wiki-theme");
        if (saved === "dark") document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
    <script defer src="./kitty-frames.js"></script>
    <script defer src="./landing.js"></script>
  </head>
  <body>
    <main class="landing">
      <pre id="kitty" class="kitty" aria-hidden="true"></pre>

      <section class="landing-card">
        <p class="eyebrow">관계위키 · since 2026.05.21</p>
        <h1 class="landing-title">
          지오 <span class="heart" aria-hidden="true">♥</span> 동현
        </h1>
        <p class="landing-sub">
          같이 보낸 날들과 통화로 쌓인 마음을<br />
          나무위키처럼 정리해 둔 우리만의 문서.
        </p>
        <a class="enter-button" href="./wiki.html">
          자세히보기
          <span class="enter-arrow" aria-hidden="true">→</span>
        </a>
        <p class="landing-foot">
          <a href="https://github.com/lukealwaysawake/luke-jio-wiki" target="_blank" rel="noreferrer">편집 · GitHub</a>
        </p>
      </section>
    </main>
  </body>
</html>
